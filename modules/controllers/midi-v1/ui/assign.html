<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MIDI assignments</title>
  <link rel="stylesheet" href="./assign.css" />
</head>
<body>
  <div id="app">
    <header class="hdr">
      <h1 class="hdr__title">MIDI assignments</h1>
    </header>
    <p id="banner-offline" class="banner banner--error" hidden>Disconnected from controller.</p>
    <ul id="list" class="list"></ul>
  </div>
  <div id="modal" class="modal" hidden>
    <div class="modal__backdrop"></div>
    <div class="modal__panel" role="dialog" aria-labelledby="modal-title">
      <h2 id="modal-title" class="modal__title">Edit assignment</h2>
      <div id="modal-body" class="modal__body"></div>
      <div class="modal__actions">
        <button type="button" id="modal-close" class="btn">Close</button>
      </div>
    </div>
  </div>
  <script src="./assign.js"></script>
</body>
</html>
