<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1" />
    <title>MIDI assignments</title>
    <link rel="stylesheet"
          href="./assign.css" />
  </head>

  <body>
    <div id="app">
      <p id="banner-offline"
         class="banner banner--error"
         hidden>Disconnected from controller.</p>
      <div id="list-wrap"
           class="list-wrap">
        <ul id="list"
            class="list"></ul>
      </div>
    </div>
    <div id="modal"
         class="modal"
         hidden>
      <div class="modal__backdrop"></div>
      <div class="modal__panel"
           role="dialog"
           aria-label="Edit MIDI assignment">
        <div id="modal-body"
             class="modal__body"></div>
        <div class="modal__actions">
          <button type="button"
                  id="modal-close"
                  class="btn">Close</button>
        </div>
      </div>
    </div>
    <script type="module"
            src="./js/assignApp.js"></script>
  </body>

</html>
