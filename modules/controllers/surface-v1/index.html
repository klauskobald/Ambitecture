<!DOCTYPE html>
<html lang="en">

   <head>
      <meta charset="UTF-8">
      <meta name="viewport"
            content="width=device-width, initial-scale=1">
      <title>Ambitecture — Surface V1</title>
      <link rel="stylesheet"
            href="src/styles/theme.css">
      <link rel="stylesheet"
            href="src/styles/layout.css">
      <link rel="stylesheet"
            href="src/styles/controls.css">
      <link rel="stylesheet"
            href="src/styles/modal.css">
      <link rel="stylesheet"
            href="src/styles/editPanel.css">
   </head>

   <body>
      <div id="app-root"
           class="app">
        <nav class="app-nav"
              id="app-nav"
              aria-label="Pane navigation">
           <button class="nav-toggle"
                   id="nav-toggle"
                   aria-label="Toggle navigation"
                   aria-expanded="false">☰</button>
           <h1 class="app-title">Surface V1</h1>
            <a class="nav-link"
               data-pane="perform"
               href="#perform">Perform</a>
            <a class="nav-link"
               data-pane="edit"
               href="#edit">Edit</a>
            <a class="nav-link"
               data-pane="scenes"
               href="#scenes">Scenes</a>
         </nav>
         <main class="app-main">
            <div class="sim-area"
                 id="sim-area">
               <div class="sim-stack"
                    id="sim-stack">
                  <iframe id="sim-frame"
                          title="Simulator 2D (hub-driven)"></iframe>
                  <canvas id="touch-overlay"
                          aria-hidden="true"></canvas>
                  <div id="perform-hud-layer"
                       class="perform-hud-layer"
                       aria-hidden="true"></div>
               </div>
            </div>
            <div class="pane-host"
                 id="pane-host"></div>
         </main>
      </div>
      <script type="module"
              src="src/app/main.js"></script>
   </body>

</html>
