systemCapabilities:
  functionCurves:
    - linear
    - quadratic
    - cubic
    - sqrt
    - smoothstep
  intentProperties:
    light:
      - dotKey: name
        name: Name
        type: string
        noMultiple: true
        isMandatory: true
      - dotKey: layer
        name: Layer
        type: scalar
        range: [1, 200]
        defaultValue: 100
        noMultiple: true
      - dotKey: params.alpha
        name: Alpha
        type: scalar
        range: [0, 1]
        defaultValue: 1
        isMandatory: true
        delta:
          value: { fn: ADD, range: [-1, 1] }
      - dotKey: params.blend
        name: Blend
        type: string
        options: [ADD, ALPHA, MULTIPLY]
        defaultValue: ADD
        noMultiple: true
        isMandatory: true
      - dotKey: radius
        name: Radius
        type: scalar
        range: [0, 20]
        defaultValue: 5
        isMandatory: true
        delta:
          value: { fn: MULTIPLY, range: [0.1, 10] }
      - dotKey: radiusFunction
        name: Radius Fn
        type: string
        optionsRef: functionCurves
        defaultValue: quadratic
        noMultiple: true
        isMandatory: true
      - dotKey: params.color
        name: Color
        type: color
        defaultValue:
          x: 0
          y: 0
          Y: 1
        range:
          h: [0, 360]
          s: [0, 1]
          l: [0, 1]
        delta:
          h: { fn: ADD, range: [-10, 10] }
          s: { fn: ADD, range: [-0.1, 0.1] }
          l: { fn: ADD, range: [-0.1, 0.1] }
      # THIS IS NOT WORKING AS EXPECTED.
      # - dotKey: params.brightness
      #   name: Brightness
      #   type: scalar
      #   range: [0, 1]
      #   defaultValue: 1
      #   delta:
      #     value: { fn: ADD, range: [-1, 1] }
      - dotKey: params.strobe
        name: Strobe
        type: scalar
        range: [0, 1]
        defaultValue: 0
        delta:
          value: { fn: ADD, range: [-1, 1] }
      - dotKey: params.aux.amber
        name: Amber
        type: scalar
        range: [0, 1]
        defaultValue: 0
        delta:
          value: { fn: ADD, range: [-1, 1] }

