systemCapabilities:
  functionCurves:
    - linear
    - quadratic
    - cubic
    - sqrt
    - smoothstep
  intentProperties:
    # these are the properties that are available for all intents and show up in the controllers.
    master:
      - dotKey: name
        name: Name
        type: string
        noMultiple: true
        isMandatory: true
      - dotKey: params.brightness
        name: Brightness
        type: scalar
        range: [0, 2]
        step: 0.005
        defaultValue: 1
        quickPanel: true
        isMandatory: true

    light:
      - dotKey: name
        name: Name
        type: string
        noMultiple: true
        isMandatory: true
      - dotKey: layer
        name: Layer
        type: scalar
        range: [1, 200]
        step: 1
        defaultValue: 100
        noMultiple: true
        isMandatory: true
      - dotKey: params.alpha
        name: Alpha
        allowOverlay: true
        type: scalar
        range: [0, 1]
        step: 0.01
        defaultValue: 1
        isMandatory: true
        quickPanel: true
        delta:
          value: { fn: ADD, range: [-1, 1] }
      - dotKey: params.blend
        name: Blend
        type: string
        allowOverlay: true
        options: [ADD, ALPHA, MULTIPLY]
        defaultValue: ADD
        noMultiple: true
        isMandatory: true
      - dotKey: radius
        name: Radius
        allowOverlay: true
        type: scalar
        range: [0, 20]
        step: 0.1
        stepFunction: quadratic
        defaultValue: 5
        isMandatory: true
        delta:
          value: { fn: MULTIPLY, range: [0.1, 10] }
      - dotKey: radiusFunction
        name: Radius Fn
        allowOverlay: true
        type: string
        optionsRef: functionCurves
        defaultValue: quadratic
        noMultiple: true
        isMandatory: true
      - dotKey: params.color
        name: Color
        type: color
        allowOverlay: true
        defaultValue:
          x: 0
          y: 0
          Y: 1
        range:
          h: [0, 360]
          s: [0, 1]
          l: [0, 1]
        delta:
          h: { fn: ADD, range: [-180, 180] }
          s: { fn: ADD, range: [-1, 1] }
          l: { fn: ADD, range: [-1, 1] }
      # THIS IS NOT WORKING AS EXPECTED.
      # - dotKey: params.brightness
      #   name: Brightness
      #   type: scalar
      #   range: [0, 1]
      #   defaultValue: 1
      #   delta:
      #     value: { fn: ADD, range: [-1, 1] }
      - dotKey: params.strobe
        name: Strobe
        allowOverlay: true
        type: scalar
        range: [0, 1]
        step: 0.01
        defaultValue: 0
        quickPanel: true
        delta:
          value: { fn: ADD, range: [-1, 1] }
      - dotKey: params.aux.amber
        name: Amber
        allowOverlay: true
        type: scalar
        range: [0, 1]
        step: 0.01
        defaultValue: 0
        delta:
          value: { fn: ADD, range: [-1, 1] }
      - dotKey: position
        name: Position
        allowOverlay: true
        type: infoText
        noMultiple: true
        isMandatory: true

