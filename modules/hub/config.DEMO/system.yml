dataDir: ../../var

# Connector physics solver (hub-side). Speeds are frame-rate independent of `fps`.
physics:
  fps: 20
  sleepVelocity: 0.0005
  iterations: 8
  # Perform-dragging pulls the intent to a fixed anchor via a critically-damped drag link, so its mass
  # governs lag. maxForce caps the impulse propagated into the connection chain (stability). The drag is
  # released exactly on pointer-up (explicit), so no release-timeout is needed.
  dragStiffness: 100
  dragMaxForce: 1500

systemCapabilities:

  animationActionProperties:
    - key: command
      name: Command
      type: string
      display: pills
      options: [run, stop, pause]
      defaultValue: run

  animationCommonProperties:
    runmode:
      type: string
      display: pills
      options: [auto, manual]
      defaultValue: auto
  
  animations:
    - class: keyframeAnimator
      name: Keyframe

      display:
        content.length:
          type: slider
        content.repeat:
          type: slider
        content.lerp.quantization:
          type: slider
        content.lerp.minMs:
          type: slider
        content.lerp.time:
          type: slider
        content.lerp.curve:
          type: dropdown

  inputTypes:
    - class: button
      name: Button
      hint: tap
      params:
        args: jsonString 
    - class: momentarySwitch
      name: Momentary Switch
      hint: hold
      params:
        argsOn: jsonString
        argsOff: jsonString
    - class: toggle
      name: Toggle
      hint: latch
      params:
        argsOn: jsonString
        argsOff: jsonString
  displayTypes:
    - class: button
      name: Button
      
  functionCurves:
    - linear
    - quadratic
    - cubic
    - sqrt
    - smoothstep
    - hard

  # Physical link types an intent can form with another intent (rod/spring/rope) and their tunable params.
  connectorTypes:
    - kind: rod
      name: Rod
      params:
        - dotKey: rotationSpring
          name: Rotation
          range: [0.01, 0.1]
          step: 0.001
          defaultValue: 0.05
          stepFunction: cubic
    - kind: spring
      name: Spring
      params:
        - dotKey: springForce
          name: Force
          range: [0.1, 0.9]
          step: 0.01
          defaultValue: 0.5
    - kind: rope
      name: Rope
      params: []

  intentProperties:
    # these are the properties that are available for all intents and show up in the controllers.
    master:
      - dotKey: name
        name: Name
        type: string
        display: string
        noMultiple: true
        isMandatory: true
        ignoreInParamsEditor: true
      - dotKey: params.brightness
        name: Brightness
        type: number
        display: scalar
        range: [0, 2]
        step: 0.005
        defaultValue: 1
        quickPanel: true
        isMandatory: true

    light:
      - dotKey: name
        name: Name
        type: string
        noMultiple: true
        isMandatory: true
        ignoreInParamsEditor: true
        display: string        
      - dotKey: layer
        name: Layer
        type: number
        display: scalar
        range: [1, 200]
        step: 1
        defaultValue: 100
        noMultiple: true
        isMandatory: true
        ignoreInParamsEditor: true

      - dotKey: params.alpha
        name: Alpha
        allowOverlay: true
        type: number
        display: scalar
        range: [0, 1]
        step: 0.01
        defaultValue: 1
        isMandatory: true
        quickPanel: true
        delta:
          value: { fn: ADD, range: [-1, 1] }
      - dotKey: params.blend
        name: Blend
        type: string
        display: pills
        allowOverlay: true
        options: [ADD, ALPHA, MULTIPLY]
        defaultValue: ADD
        noMultiple: true
        isMandatory: true
      - dotKey: radius
        name: Radius
        allowOverlay: true
        type: number
        display: scalar
        range: [0.1, 20]
        step: 0.1
        stepFunction: quadratic
        defaultValue: 5
        isMandatory: true
        quickPanel: true
        delta:
          value: { fn: MULTIPLY, range: [0.1, 10] }
      - dotKey: radiusFunction
        name: Radius Fn
        allowOverlay: true
        type: string
        display: pills
        optionsRef: functionCurves
        defaultValue: quadratic
        noMultiple: true
        isMandatory: true
      - dotKey: params.color
        name: Color
        type: color
        display: color
        allowOverlay: true
        components:
          - key: h
            name: Hue
            type: number
            display: scalar
            range: [0, 360]
            step: 1
            defaultValue: 0
          - key: s
            name: Saturation
            type: number
            display: scalar
            range: [0, 1]
            step: 0.01
            defaultValue: 1
          - key: l
            name: Lightness
            type: number
            display: scalar
            range: [0, 1]
            step: 0.01
            defaultValue: 1
        defaultValue:
          h: [0]
          s: [1]
          l: [ 1]
        range:
          h: [0, 360]
          s: [0, 1]
          l: [0, 1]
        delta:
          h: { fn: ADD, range: [-180, 180] }
          s: { fn: ADD, range: [-1, 1] }
          l: { fn: ADD, range: [-1, 1] }
     
      - dotKey: params.strobe
        name: Strobe
        allowOverlay: true
        type: number
        display: scalar
        range: [0, 3]
        step: 0.01
        defaultValue: 0
        quickPanel: true
        delta:
          value: { fn: ADD, range: [-1, 1] }
      - dotKey: params.aux.amber
        name: Amber
        allowOverlay: true
        type: number
        display: scalar
        range: [0, 1]
        step: 0.01
        defaultValue: 0
        delta:
          value: { fn: ADD, range: [-1, 1] }
      - dotKey: mass
        name: Mass
        type: number
        display: scalar
        range: [0.1, 10]
        step: 0.1
        stepFunction: quadratic
        defaultValue: 1
        isMandatory: true
      - dotKey: drag
        name: Drag
        type: number
        display: scalar
        range: [0, 1]
        step: 0.01
        defaultValue: 0.1
        stepFunction: quadratic
        isMandatory: true
      - dotKey: position
        name: Position
        allowOverlay: true
        type: vector3
        components:
          - key: 0
            name: X
            type: number
            display: scalar
            range: RUNTIME:zones_range:x
            step: 0.01
            defaultValue: 0
          - key: 1
            name: Y
            type: number
            display: scalar
            range: RUNTIME:zones_range:y
            step: 0.01
            defaultValue: 0
          - key: 2
            name: Z
            type: number
            display: scalar
            range: RUNTIME:zones_range:z
            step: 0.01
        noMultiple: true
        isMandatory: true
        display: vector3

    target:
      - dotKey: name
        name: Name
        type: string
        display: string
        noMultiple: true
        isMandatory: true
        ignoreInParamsEditor: true
      - dotKey: layer
        name: Layer
        type: number
        display: scalar
        range: [1, 200]
        step: 1
        defaultValue: 100
        noMultiple: true
        isMandatory: true
        ignoreInParamsEditor: true
      - dotKey: params.alpha
        name: Alpha
        type: number
        display: scalar
        range: [0, 1]
        step: 0.01
        defaultValue: 1
        isMandatory: true
        quickPanel: true
      - dotKey: radius
        name: Radius
        type: number
        display: scalar
        range: [0.1, 20]
        step: 0.1
        stepFunction: quadratic
        defaultValue: 5
        isMandatory: true
        quickPanel: true
      - dotKey: radiusFunction
        name: Radius Fn
        type: string
        display: pills
        optionsRef: functionCurves
        defaultValue: quadratic
        noMultiple: true
        isMandatory: true
      - dotKey: params.mode
        name: Mode
        type: string
        display: pills
        options: [Attract, Repel]
        defaultValue: Attract
        noMultiple: true
        isMandatory: true
      - dotKey: params.speed
        name: Follow Time
        type: number
        display: scalar
        range: [0, "RUNTIME:maxFollowTime"]
        step: 0.01
        stepFunction: sqr
        defaultValue: 0.5
        isMandatory: true
        quickPanel: true
      - dotKey: mass
        name: Mass
        type: number
        display: scalar
        range: [0.1, 10]
        step: 0.05
        stepFunction: quadratic
        defaultValue: 1
        isMandatory: true
      - dotKey: drag
        name: Drag
        type: number
        display: scalar
        range: [0, 1]
        step: 0.01
        defaultValue: 0
        isMandatory: true
      - dotKey: position
        name: Position
        type: vector3
        components:
          - key: 0
            name: X
            type: number
            display: scalar
            range: RUNTIME:zones_range:x
            step: 0.01
            defaultValue: 0
          - key: 1
            name: Y
            type: number
            display: scalar
            range: RUNTIME:zones_range:y
            step: 0.01
            defaultValue: 0
          - key: 2
            name: Z
            type: number
            display: scalar
            range: RUNTIME:zones_range:z
            step: 0.01
        noMultiple: true
        isMandatory: true
        display: vector3

pulse:
  tapTempo:
    minBpm: 20
    maxBpm: 300
    minTaps: 2
    windowMs: 2500
    smoothing: 0.35
    persistDebounceMs: 400

