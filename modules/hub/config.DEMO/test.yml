host: localhost:3000

testParams:
  001-blinker.ts:
    # Each cycle: send all events in one message. `scheduled` is ms relative to cycle start (converted to epoch ms: batchStart + scheduled).
    # `interval` is ms between cycles.
    location: [0,0] # somewhere in the ocean
    interval: 4000 # ms between batches
    # events:
    #   - class: master
    #     scheduled: 0
    #     params:
    #       brightness: 1
    #   - class: light
    #     scheduled: 0
    #     position: [0,0,0]
    #     params:
    #       color: {"rgb": [255,0,255]}
    #       strobe: 0
    #       layer: 100
    #       blend: ADD
    #       alpha: 1


    events:
      - class: master
        scheduled: 0
        params:
          brightness: 1

      - class: light
        scheduled: 0
        position: [1,0,2]
        params:
          color: {"rgb": [111,111,111]}
          strobe: 0
          layer: 10
          blend: ADD
          alpha: 1

      - class: light
        scheduled: 500
        position: [2,0,3]
        params:
          color: {"rgb": [111,111,111]}
          strobe: 0
          layer: 10
          blend: ADD
          alpha: 1
      - class: light
        scheduled: 1000
        position: [3,0,4]
        params:
          color: {"rgb": [111,111,111]}
          strobe: 0
          layer: 10
          blend: ADD
          alpha: 1
      - class: light
        scheduled: 1500
        position: [4,0,5]
        params:
          color: {"rgb": [111,111,111]}
          strobe: 0
          layer: 10
          blend: ADD
          alpha: 1  
      - class: light
        scheduled: 2000
        position: [5,0,6]
        params:
          color: {"rgb": [111,111,111]}
          strobe: 0
