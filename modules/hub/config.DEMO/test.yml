host: localhost:3000

testParams:
  001-blinker.ts:
    # Each cycle: send all events in one message. `scheduled` is ms relative to cycle start (converted to epoch ms: batchStart + scheduled).
    # `interval` is ms between cycles.
    location: [0,0] # somewhere in the ocean
    interval: 5000 # ms between batches
    events:
      - class: master
        scheduled: 0
        params:
          brightness: 1
      - class: light
        scheduled: 0
        position: [0,0,0]
        params:
          color: {"rgb": [255,0,255]}
          strobe: 0
          layer: 100
          blend: ADD
          alpha: 1


