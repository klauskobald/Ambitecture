host: localhost:3000

testParams:
  001-blinker.ts:
    # loop thru events array with interval and schedule them with time 0 (immediately shown when arriving at renderer) 
    location: [0,0] # somewhere in the ocean
    interval: 1000 # ms
    events:
      - class: light
        scheduled: 0
        position: [0,0,0]
        params:
          color: {"rgb": [255,0,0]}
          layer: 100
          blend: ADD
          alpha: 1
      - class: light
        scheduled: 0
        position: [0,0,0]
        params:
          color: {"rgb": [0,255,0]}
          layer: 100
          blend: ADD
          alpha: 1 
      - class: light
        scheduled: 0
        position: [0,0,0]
        params:
          color: {"rgb": [0,0,255]}
          layer: 100
          blend: ADD
          alpha: 1 