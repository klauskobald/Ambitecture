<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ambitecture — Simulator 2D</title>
  <style>
    /* Fill the iframe (or tab): chain height so % works; min-height for standalone. */
    html {
      height: 100%;
    }
    body {
      height: 100%;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      background: #111;
      box-sizing: border-box;
    }
    /* Fills body under #status; canvas is centered and sized in JS so layout box matches drawn bitmap (controller overlay). */
    #sim-stage {
      flex: 1 1 0;
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #sim-canvas {
      display: block;
      flex: 0 0 auto;
    }
    #status {
      flex: 0 0 auto;
      color: #555;
      font: 11px/1 monospace;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
  <div id="sim-stage">
    <canvas id="sim-canvas"></canvas>
  </div>
  <div id="status">loading…</div>

  <script src="src/color.js"></script>
  <script src="src/EventQueue.js"></script>
  <script src="src/CanvasRenderer.js"></script>
  <script src="src/CanvasDraw.js"></script>
  <script src="src/Vector3.js"></script>
  <script src="src/FnCurve.js"></script>
  <script src="src/layerIntent/LayerIntentEngine.js"></script>
  <script src="src/fixtures/LightBase.js"></script>
  <script src="src/fixtures/dmx_light_static.js"></script>
  <script src="src/events/EventBase.js"></script>
  <script src="src/events/EventLight.js"></script>
  <script src="src/events/EventMaster.js"></script>
  <script src="src/handlers/ConfigHandler.js"></script>
  <script src="src/handlers/EventsHandler.js"></script>
  <script src="src/HubConnection.js"></script>
  <script>
    (async () => {
      const config = await fetch('./src/config.json').then(r => r.json());
      const stage = document.getElementById('sim-stage');
      const canvas = document.getElementById('sim-canvas');
      if (!(stage instanceof HTMLElement) || !(canvas instanceof HTMLCanvasElement)) {
        return;
      }

      function fitSimCanvasToStage() {
        const rw = stage.clientWidth;
        const rh = stage.clientHeight;
        const bw = canvas.width;
        const bh = canvas.height;
        if (rw <= 0 || rh <= 0 || bw <= 0 || bh <= 0) {
          canvas.style.width = '';
          canvas.style.height = '';
          return;
        }
        const scale = Math.min(rw / bw, rh / bh);
        const dw = bw * scale;
        const dh = bh * scale;
        canvas.style.width = `${dw}px`;
        canvas.style.height = `${dh}px`;
      }

      const roStage = new ResizeObserver(() => {
        fitSimCanvasToStage();
      });
      roStage.observe(stage);
      const roCanvas = new ResizeObserver(() => {
        fitSimCanvasToStage();
      });
      roCanvas.observe(canvas);

      const moCanvas = new MutationObserver(() => {
        fitSimCanvasToStage();
      });
      moCanvas.observe(canvas, { attributes: true, attributeFilter: ['width', 'height'] });

      const renderer = new CanvasRenderer(canvas, config);
      renderer.start();
      const hub = new HubConnection(config, renderer);
      hub.connect();
      fitSimCanvasToStage();
    })();
  </script>
</body>
</html>
